name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Validate release version
        run: |
          VERSION_NAME="$(sed -n 's/^appVersionName=//p' gradle.properties)"
          VERSION_CODE="$(sed -n 's/^appVersionCode=//p' gradle.properties)"
          test -n "$VERSION_NAME"
          test -n "$VERSION_CODE"
          test "$VERSION_NAME" = "${{ inputs.version }}"
          TAG_NAME="v$VERSION_NAME"
          git fetch --tags --force
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
            exit 1
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
      - name: Check release signing secrets
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
      - name: Extract changelog
        run: |
          awk -v version="$VERSION_NAME" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release_notes.md
          test -s release_notes.md
      - name: Restore release keystore
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RELEASE_STORE_FILE"
      - name: Build release APKs
        run: ./gradlew :app:assembleLegacyRelease :app:assembleModernApi102Release --no-daemon
      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/legacy/release/app-legacy-release.apk "dist/BiliHDPager-${VERSION_NAME}-legacy.apk"
          cp app/build/outputs/apk/modernApi102/release/app-modernApi102-release.apk "dist/BiliHDPager-${VERSION_NAME}-modern-api102.apk"
      - name: Verify APK signatures
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --print-certs "dist/BiliHDPager-${VERSION_NAME}-legacy.apk"
          "$APKSIGNER" verify --print-certs "dist/BiliHDPager-${VERSION_NAME}-modern-api102.apk"
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: BiliHDPager ${{ env.VERSION_NAME }}
          body_path: release_notes.md
          files: dist/*.apk
